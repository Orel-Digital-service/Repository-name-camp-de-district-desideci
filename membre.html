<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Membre du Bureau – Camp de District de Sideci</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>

    /* ── Variables ── */
    :root {
      --bleu-nuit  : #001466;
      --or         : #f0c040;
      --blanc      : #ffffff;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family    : 'Rajdhani', sans-serif;
      background     : var(--bleu-nuit);
      min-height     : 100vh;
      display        : flex;
      flex-direction : column;
      align-items    : center;
      justify-content: center;
      overflow       : hidden;
      text-align     : center;
      padding        : 20px;
    }

    /* ── Fond animé ── */
    body::before {
      content       : '';
      position      : fixed;
      inset         : -50%;
      background    : radial-gradient(ellipse at 30% 40%, #1a56ff44, transparent 60%),
                      radial-gradient(ellipse at 70% 70%, #0011aa44, transparent 60%);
      animation     : tourner 20s linear infinite;
      pointer-events: none;
    }
    @keyframes tourner {
      from { transform: rotate(0deg)   scale(1.2); }
      to   { transform: rotate(360deg) scale(1.2); }
    }

    /* ── Carte centrale ── */
    .carte {
      position       : relative;
      z-index        : 2;
      background     : rgba(255,255,255,0.05);
      border         : 2px solid rgba(240,192,64,0.4);
      backdrop-filter: blur(16px);
      border-radius  : 24px;
      padding        : 40px 36px 36px;
      max-width      : 420px;
      width          : 100%;
      animation      : apparaitre 0.7s ease both;
      box-shadow     : 0 20px 60px rgba(0,0,0,0.5);
    }
    @keyframes apparaitre {
      from { opacity:0; transform: scale(0.85) translateY(30px); }
      to   { opacity:1; transform: scale(1)    translateY(0);    }
    }

    /* ── Logo ── */
    .logo {
      width      : 80px;
      display    : block;
      margin     : 0 auto 16px;
      filter     : drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      animation  : rebond 2.5s ease-in-out infinite;
    }
    @keyframes rebond {
      0%, 100% { transform: translateY(0);   }
      50%      { transform: translateY(-8px); }
    }

    /* ── Organisation ── */
    .org {
      font-size      : 0.72rem;
      font-weight    : 700;
      letter-spacing : 0.25em;
      color          : var(--or);
      text-transform : uppercase;
    }

    /* ── Séparateur ── */
    .ligne {
      width      : 60px;
      height     : 2px;
      background : linear-gradient(90deg, transparent, var(--or), transparent);
      margin     : 10px auto 20px;
    }

    /* ══════════════════════
       1. NOM ET PRÉNOM
       ══════════════════════ */
    .label-section {
      font-size      : 0.65rem;
      font-weight    : 700;
      letter-spacing : 0.3em;
      color          : rgba(255,255,255,0.35);
      text-transform : uppercase;
      margin-bottom  : 4px;
    }

    .nom-prenom {
      font-family    : 'Bebas Neue', cursive;
      font-size      : clamp(2.2rem, 9vw, 3.4rem);
      color          : var(--blanc);
      line-height    : 1;
      letter-spacing : 0.06em;
      text-shadow    : 0 4px 24px rgba(0,0,120,0.6);
      margin-bottom  : 20px;
    }

    /* ══════════════════════
       2. TITRE
       ══════════════════════ */
    .titre-badge {
      display        : inline-block;
      background     : linear-gradient(135deg, var(--or), #c89000);
      color          : var(--bleu-nuit);
      font-family    : 'Bebas Neue', cursive;
      font-size      : 1.2rem;
      letter-spacing : 0.2em;
      padding        : 7px 26px;
      border-radius  : 999px;
      margin-bottom  : 20px;
      box-shadow     : 0 4px 14px rgba(240,192,64,0.4);
    }

    /* ══════════════════════
       3. RÔLE DANS LE BUREAU
       ══════════════════════ */
    .role-texte {
      font-family    : 'Rajdhani', sans-serif;
      font-size      : 1.1rem;
      font-weight    : 700;
      color          : var(--blanc);
      letter-spacing : 0.05em;
      text-transform : uppercase;
      line-height    : 1.3;
      margin-bottom  : 24px;
      padding        : 12px 18px;
      background     : rgba(255,255,255,0.07);
      border-radius  : 12px;
      border         : 1px solid rgba(255,255,255,0.1);
    }

    /* ── Camp ── */
    .camp {
      font-family    : 'Bebas Neue', cursive;
      font-size      : 0.95rem;
      letter-spacing : 0.2em;
      color          : rgba(255,255,255,0.35);
    }

    /* ── Erreur ── */
    .erreur { color: rgba(255,80,80,0.9); font-size: 1.1rem; }

  </style>
</head>
<body>

  <div class="carte" id="carte"></div>

  <script>

    /* ══════════════════════════════════════════════════
       15 membres du Bureau — Camp de District de Sideci
       Affichage au scan :
         1. NOM ET PRÉNOM
         2. TITRE
         3. RÔLE DANS LE BUREAU
       ══════════════════════════════════════════════════ */

    var membres = [
      { id:1,  nom:"Legnan Joël",       titre:"CTA",       role:"Directeur du Camp"                        },
      { id:2,  nom:"Willy",             titre:"CTA",       role:"Directeur Adjoint"                        },
      { id:3,  nom:"Meli Aristide",     titre:"CTA",       role:"Secrétaire du Camp"                       },
      { id:4,  nom:"GONTO Josias",      titre:"CT",        role:"Commissaire de Police"                    },
      { id:5,  nom:"Hurus",             titre:"CT",        role:"Commissaire de Police Adjoint"            },
      { id:6,  nom:"CHEF-Bekanti Marc Orel", titre:"SP",      role:"Secrétaire de la Police & Communication" },
      { id:7,  nom:"Mariam",            titre:"CD",        role:"Responsable Cuisine"                      },
      { id:8,  nom:"Rebecca",           titre:"CD",        role:"Responsable Cuisine Adjointe"             },
      { id:9,  nom:"Armand",            titre:"CT",        role:"Responsable Sport"                        },
      { id:10, nom:"Decaho",            titre:"CP",        role:"Responsable Prière"                       },
      { id:11, nom:"Gombleu Aquilas",   titre:"CP",        role:"Responsable Prière Adjoint"               },
      { id:12, nom:"CHEF Emmanuel",          titre:"SP",      role:"Responsable Mission & Communication"      },
      { id:13, nom:"Kouame Patrick",           titre:"ELT",       role:"Responsable Animation"                    },
      { id:14, nom:"inconnutos",              titre:"—",         role:"Infirmier du Camp"                        },
      { id:15, nom:"Émilie",            titre:"CP", role:"Trésorière du Camp"                       }
    ];

    /* Lecture de l'URL (?id=X) */
    var params  = new URLSearchParams(window.location.search);
    var idParam = parseInt(params.get('id'));
    var membre  = membres.find(function(m){ return m.id === idParam; });
    var carte   = document.getElementById('carte');

    if (membre) {

      document.title = membre.nom + ' · ' + membre.role + ' – Camp Sideci';

      carte.innerHTML =

        /* Logo */
        '<img class="logo" src="logo_jea.png" alt="Logo JEA"/>' +
        '<p class="org">Jeunesse Évangélique Africaine</p>' +
        '<div class="ligne"></div>' +

        /* 1. NOM ET PRÉNOM */
        '<p class="label-section">Nom &amp; Prénom</p>' +
        '<h1 class="nom-prenom">' + membre.nom + '</h1>' +

        /* 2. TITRE */
        '<p class="label-section">Titre</p>' +
        '<div class="titre-badge">' + membre.titre + '</div>' +

        /* 3. RÔLE DANS LE BUREAU */
        '<p class="label-section">Rôle dans le bureau</p>' +
        '<p class="role-texte">' + membre.role + '</p>' +

        /* Camp */
        '<p class="camp">⛺ Camp de District de Sideci</p>';

    } else {

      carte.innerHTML =
        '<img class="logo" src="logo_jea.png" alt="Logo JEA"/>' +
        '<p class="erreur">⚠️ Membre introuvable.<br/>Vérifie le QR code.</p>';
    }

  </script>

</body>
</html>
