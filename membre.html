<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Membre du Bureau – Camp de District de Sideci</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>

    :root {
      --bleu-vif   : #0044ff;
      --bleu-nuit  : #001466;
      --bleu-fonce : #002299;
      --or         : #f0c040;
      --blanc      : #ffffff;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* ══════════════════════════════════
       FOND : BLEU VIF + RAYURES DIAGONALES
       (comme le visuel du camp)
       ══════════════════════════════════ */
    body {
      font-family    : 'Rajdhani', sans-serif;
      min-height     : 100vh;
      display        : flex;
      flex-direction : column;
      align-items    : center;
      justify-content: center;
      padding        : 20px;
      text-align     : center;
      overflow       : hidden;
      position       : relative;

      /* Fond bleu vif de base */
      background-color : var(--bleu-vif);
    }

    /* ── Rayures diagonales bleu foncé ── */
    body::before {
      content  : '';
      position : fixed;
      inset    : -100%;
      width    : 300%;
      height   : 300%;

      /* Rayures diagonales comme le flyer */
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(0, 20, 102, 0.45) 60px,
        rgba(0, 20, 102, 0.45) 120px
      );
      pointer-events : none;
      z-index        : 0;
    }

    /* ── Lueur centrale lumineuse ── */
    body::after {
      content    : '';
      position   : fixed;
      top        : 50%;
      left       : 50%;
      transform  : translate(-50%, -50%);
      width      : 500px;
      height     : 500px;
      background : radial-gradient(circle, rgba(100,160,255,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index    : 0;
    }

    /* ══════════════════════════════
       CARTE CENTRALE
       ══════════════════════════════ */
    .carte {
      position       : relative;
      z-index        : 2;
      background     : rgba(0, 10, 80, 0.55);
      border         : 2px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius  : 28px;
      padding        : 40px 36px 36px;
      max-width      : 420px;
      width          : 100%;
      animation      : apparaitre 0.7s cubic-bezier(.22,1,.36,1) both;
      box-shadow     : 0 24px 64px rgba(0,0,0,0.45),
                       inset 0 1px 0 rgba(255,255,255,0.15);
    }

    @keyframes apparaitre {
      from { opacity:0; transform: scale(0.88) translateY(32px); }
      to   { opacity:1; transform: scale(1)    translateY(0);    }
    }

    /* ── Logo ── */
    .logo {
      width      : 82px;
      display    : block;
      margin     : 0 auto 16px;
      filter     : drop-shadow(0 4px 16px rgba(0,0,0,0.6));
      animation  : rebond 2.8s ease-in-out infinite;
    }
    @keyframes rebond {
      0%,100% { transform: translateY(0);    }
      50%     { transform: translateY(-8px); }
    }

    /* ── Organisation ── */
    .org {
      font-size      : 0.7rem;
      font-weight    : 700;
      letter-spacing : 0.28em;
      color          : var(--or);
      text-transform : uppercase;
    }

    /* ── Séparateur ── */
    .ligne {
      width      : 70px;
      height     : 2px;
      background : linear-gradient(90deg, transparent, var(--or), transparent);
      margin     : 10px auto 20px;
    }

    /* ══════════════════════
       1. NOM ET PRÉNOM
       ══════════════════════ */
    .label-section {
      font-size      : 0.62rem;
      font-weight    : 700;
      letter-spacing : 0.32em;
      color          : rgba(255,255,255,0.4);
      text-transform : uppercase;
      margin-bottom  : 4px;
    }

    .nom-prenom {
      font-family    : 'Bebas Neue', cursive;
      font-size      : clamp(2.2rem, 9vw, 3.4rem);
      color          : var(--blanc);
      line-height    : 1;
      letter-spacing : 0.06em;
      text-shadow    : 0 0 30px rgba(100,160,255,0.6),
                       0 4px 16px rgba(0,0,0,0.5);
      margin-bottom  : 18px;
    }

    /* ══════════════════════
       2. TITRE
       ══════════════════════ */
    .titre-badge {
      display        : inline-block;
      background     : linear-gradient(135deg, var(--or), #d4a800);
      color          : var(--bleu-nuit);
      font-family    : 'Bebas Neue', cursive;
      font-size      : 1.25rem;
      letter-spacing : 0.22em;
      padding        : 7px 28px;
      border-radius  : 999px;
      margin-bottom  : 20px;
      box-shadow     : 0 4px 18px rgba(240,192,64,0.5);
    }

    /* ══════════════════════
       3. RÔLE DANS LE BUREAU
       ══════════════════════ */
    .role-texte {
      font-family    : 'Rajdhani', sans-serif;
      font-size      : 1.1rem;
      font-weight    : 700;
      color          : var(--blanc);
      letter-spacing : 0.05em;
      text-transform : uppercase;
      line-height    : 1.3;
      margin-bottom  : 24px;
      padding        : 12px 18px;
      background     : rgba(255,255,255,0.08);
      border-radius  : 12px;
      border         : 1px solid rgba(255,255,255,0.15);
      box-shadow     : inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* ── Nom du camp ── */
    .camp {
      font-family    : 'Bebas Neue', cursive;
      font-size      : 0.95rem;
      letter-spacing : 0.22em;
      color          : rgba(255,255,255,0.4);
    }

    /* ── Erreur ── */
    .erreur { color: rgba(255,100,100,0.95); font-size: 1.1rem; line-height:1.6; }

  </style>
</head>
<body>

  <div class="carte" id="carte"></div>

  <script>

    /* ══════════════════════════════════════════════════
       15 membres du Bureau — Camp de District de Sideci
       Affichage au scan : Nom · Titre · Rôle
       ══════════════════════════════════════════════════ */

    var membres = [
      { id:1,  nom:"Legnan Joël",         titre:"CTA", role:"Directeur du Camp"                        },
      { id:2,  nom:"Willy",               titre:"CTA", role:"Directeur Adjoint"                        },
      { id:3,  nom:"Meli Aristide",        titre:"CTA", role:"Secrétaire du Camp"                      },
      { id:4,  nom:"GONTO Josias",         titre:"CT",  role:"Commissaire de Police"                   },
      { id:5,  nom:"YAO HURUS",            titre:"CT",  role:"Commissaire de Police Adjoint"           },
      { id:6,  nom:"CHEF Kouame Kouassi Bekanti Marc Orel", titre:"SP",  role:"Secrétaire de la Police & Communication" },
      { id:7,  nom:"KONE MARIAm",titre:"CD",  role:"Responsable Cuisine"                      },
      { id:8,  nom:"Rebecca",             titre:"CD",  role:"Responsable Cuisine Adjointe"     },
      { id:9,  nom:"KOUAKOU ARMAND",      titre:"CT",  role:"Responsable Sport"                },
      { id:10, nom:"Decaho leopold",      titre:"CP",  role:"Responsable Prière"               },
      { id:11, nom:"Gombleu Aquilas",      titre:"CP",  role:"Responsable Prière Adjoint"      },
      { id:12, nom:"CHEF N'guessan Emmanuel",            titre:"SP",  role:"Responsable Mission & Communication"      },
      { id:13, nom:"Kouame Patrick",       titre:"ELT", role:"Responsable Animation"                     },
      { id:14, nom:"inconnutos",                     titre:"—",   role:"Infirmier du Camp"               },
      { id:15, nom:"COMMUN Émilie",              titre:"CP",  role:"Trésorière du Camp"                  },
      { "id": 16, "nom": "GBAMELE PAUL",            "titre": "CP",  "role": "Communication"              },
      { id:17, nom:"KOUASSI Landry",  titre:"SP",  role:"Communication Adjoint" },
      { id:18, nom:"—",               titre:"—",   role:"Communication"         }
    ];

    /* Lecture de l'URL (?id=X) */
    var params  = new URLSearchParams(window.location.search);
    var idParam = parseInt(params.get('id'));
    var membre  = membres.find(function(m){ return m.id === idParam; });
    var carte   = document.getElementById('carte');

    if (membre) {

      document.title = membre.nom + ' · ' + membre.role + ' – Camp Sideci';

      carte.innerHTML =

        /* Logo */
        '<img class="logo" src="logo_jea.png" alt="Logo JEA"/>' +
        '<p class="org">Jeunesse Évangélique Africaine</p>' +
        '<div class="ligne"></div>' +

        /* 1. NOM ET PRÉNOM */
        '<p class="label-section">Nom &amp; Prénom</p>' +
        '<h1 class="nom-prenom">' + membre.nom + '</h1>' +

        /* 2. TITRE */
        '<p class="label-section">Titre</p>' +
        '<div class="titre-badge">' + membre.titre + '</div>' +

        /* 3. RÔLE */
        '<p class="label-section">Rôle dans le bureau</p>' +
        '<p class="role-texte">' + membre.role + '</p>' +

        /* Camp */
        '<p class="camp">⛺ Camp de District de Sideci</p>';

    } else {

      carte.innerHTML =
        '<img class="logo" src="logo_jea.png" alt="Logo JEA"/>' +
        '<p class="erreur">⚠️ Membre introuvable.<br/>Vérifie le QR code.</p>';
    }

  </script>

</body>
</html>
